<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripción - El Diario de Rosario</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="estilos-base.css">
    <link rel="stylesheet" href="estilos-formulario.css">
</head>
<body>

    <header class="cabecera-diario">
        <div class="logo-fecha">
            <h1>EL DIARIO DE ROSARIO</h1>
            <p class="fecha">Formulario de Registro</p>
        </div>
    </header>

    <main class="contenedor-formulario">
        <h2 id="titulo-saludo">HOLA</h2>
        
        <form id="form-suscripcion" novalidate>
            <div class="grupo-campos">
                
                <div class="control-formulario">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez">
                    <span class="error-mensaje" id="error-nombre"></span>
                </div>

                <div class="control-formulario">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com">
                    <span class="error-mensaje" id="error-email"></span>
                </div>

                <div class="control-formulario">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres (letras y números)">
                    <span class="error-mensaje" id="error-password"></span>
                </div>

                <div class="control-formulario">
                    <label for="repetir-password">Repetir contraseña</label>
                    <input type="password" id="repetir-password" name="repetir-password" placeholder="Repetí tu contraseña">
                    <span class="error-mensaje" id="error-repetir-password"></span>
                </div>

                <div class="control-formulario">
                    <label for="edad">Edad</label>
                    <input type="number" id="edad" name="edad" placeholder="Mayor de 18 años">
                    <span class="error-mensaje" id="error-edad"></span>
                </div>

                <div class="control-formulario">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" name="telefono" placeholder="Solo números (mínimo 7 dígitos)">
                    <span class="error-mensaje" id="error-telefono"></span>
                </div>

                <div class="control-formulario">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Calle 123">
                    <span class="error-mensaje" id="error-direccion"></span>
                </div>

                <div class="control-formulario">
                    <label for="ciudad">Ciudad</label>
                    <input type="text" id="ciudad" name="ciudad" placeholder="Rosario">
                    <span class="error-mensaje" id="error-ciudad"></span>
                </div>

                <div class="control-formulario">
                    <label for="codigo-postal">Código Postal</label>
                    <input type="text" id="codigo-postal" name="codigo-postal" placeholder="2000">
                    <span class="error-mensaje" id="error-codigo-postal"></span>
                </div>

                <div class="control-formulario">
                    <label for="dni">DNI</label>
                    <input type="text" id="dni" name="dni" placeholder="7 u 8 números">
                    <span class="error-mensaje" id="error-dni"></span>
                </div>

            </div>

            <div class="contenedor-boton">
                <button type="submit" id="btn-enviar">Enviar</button>
            </div>
        </form>
    </main>

    <footer class="pie-diario">
        <p>&copy; 2026 El Diario de Rosario - Todos los derechos reservados.</p>
    </footer>

    <div id="mi-modal" class="modal-oculto">
        <div class="modal-contenido">
            <span id="btn-cerrar-modal">&times;</span>
            <h3 id="modal-titulo">Resultado</h3>
            <div id="modal-mensaje"></div>
        </div>
    </div>
    
    <script src="subscription.js"></script>
</body>
</html>
